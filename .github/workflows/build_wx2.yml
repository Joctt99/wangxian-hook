name: Build WangXian2Hook

on:
  push:
    branches: [ main ]
    paths:
      - 'WangXian2Hook.m'
      - 'fishhook.c'
      - 'fishhook.h'
      - 'Makefile.wx2'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Verify Xcode installation
      run: |
        xcodebuild -version
        xcrun --sdk iphoneos --show-sdk-path
    
    - name: Build WangXian2Hook.dylib
      run: |
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        CC=$(xcrun --sdk iphoneos --find clang)
        ARCH=arm64
        MIN_IOS=12.0
        
        # WangXian2Hook.m -> ObjC++ (for std::string support)
        # fishhook.c -> plain C
        # -fno-exceptions -fno-rtti: reduce C++ runtime dependency
        $CC -arch $ARCH \
          -isysroot $SDK_PATH \
          -miphoneos-version-min=$MIN_IOS \
          -framework Foundation \
          -framework UIKit \
          -framework CoreFoundation \
          -framework Security \
          -framework CoreGraphics \
          -lobjc \
          -lz \
          -dynamiclib \
          -O2 \
          -fobjc-arc \
          -fno-exceptions \
          -fno-rtti \
          -x objective-c++ WangXian2Hook.m \
          -x c fishhook.c \
          -o WangXian2Hook.dylib
        
        echo "Build completed successfully!"
        ls -la WangXian2Hook.dylib
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WangXian2Hook
        path: WangXian2Hook.dylib
        retention-days: 30
