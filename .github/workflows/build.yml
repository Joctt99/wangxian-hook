name: Build WangXianHook.dylib

on:
  push:
    branches: [ main ]
    paths:
      - 'WangXianHook.m'
      - 'Makefile'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build dylib
        run: make

      - name: Verify output
        run: |
          file WangXianHook.dylib
          ls -la WangXianHook.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WangXianHook
          path: WangXianHook.dylib
          retention-days: 90
